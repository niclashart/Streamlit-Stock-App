services:
  postgres:
    image: postgres:15
    container_name: stock-app-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=stockapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-app-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=stockapp
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-supersecretkey}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app-network
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stock-app-frontend
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    command: streamlit run app.py
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
